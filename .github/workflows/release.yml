name: "Release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.resolve-version.outputs.version }}
      tag: ${{ steps.resolve-version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version and tag
        id: resolve-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"

            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match src-tauri/tauri.conf.json version ($VERSION)"
              exit 1
            fi
          else
            TAG="v$VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or reuse draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.resolve-version.outputs.tag }}'

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              return data.id
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04"
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm"
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "windows-11-arm"
            args: "--target aarch64-pc-windows-msvc"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "handy"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - create-release
      - publish-tauri
    if: ${{ success() }}
    steps:
      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release-id }}'),
              draft: false,
              prerelease: false,
              name: '${{ needs.create-release.outputs.tag }}',
              tag_name: '${{ needs.create-release.outputs.tag }}',
            })
